{{ define "main" }}
<div id="cmp-BlogNewsletterTabs">
    {{ partial "blog-newsletter-tabs.html" (dict "active" "blog" "feedContent" (partial "rss-feed-link.html" .)) }}
    <div class="cmp-BlogPostList">
    {{ $posts := where .Site.RegularPages "Type" "in" (slice "post") }}
    {{ range $posts }}
    {{ partial "blog-post-item.html" . }}
    {{ end }}
    </div>
</div>
{{ end }}
